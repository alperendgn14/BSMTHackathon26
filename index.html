<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOS - Avrupa Haber Tarama Ajanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

    <!-- SOL PANEL: RSS Kaynak Yönetimi (F1, F2, F3) -->
    <aside class="w-80 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-6 border-b">
            <img src="https://biosrelocation.com/wp-content/uploads/2021/05/bios-logo.png" alt="BIOS Logo" class="h-8 mb-4">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">RSS Kaynakları</h2>
        </div>
        
        <div id="rssList" class="flex-1 overflow-y-auto p-4 space-y-2">
            <!-- Dinamik RSS Listesi buraya gelecek -->
        </div>

        <div class="p-4 border-t bg-gray-50">
            <div class="flex gap-2">
                <input id="rssInput" type="text" placeholder="https://..." class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="addRSS()" class="bg-blue-600 text-white px-3 py-2 rounded hover:bg-blue-700 transition">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <p id="rssError" class="text-red-500 text-xs mt-2 hidden"></p>
        </div>
    </aside>

    <!-- ANA PANEL: Haber Akışı (F4, F8, F9) -->
    <main class="flex-1 flex flex-col">
        <header class="h-20 bg-white border-b flex items-center justify-between px-8">
            <div class="flex-1 max-w-xl">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
                    <input type="text" onkeyup="filterNews(this.value)" placeholder="Haberlerde, şirketlerde veya lokasyonlarda ara..." class="w-full pl-12 pr-4 py-2 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="lastUpdate" class="text-xs text-gray-400 font-medium italic"></span>
                <button onclick="refreshNews()" id="refreshBtn" class="bg-green-600 text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-green-700 transition flex items-center gap-2 shadow-lg shadow-green-100">
                    <i class="fas fa-sync-alt"></i> HABERLERİ YENİLE
                </button>
            </div>
        </header>

        <!-- Haber Listesi -->
        <section id="newsFeed" class="p-8 overflow-y-auto grid grid-cols-1 xl:grid-cols-2 gap-6">
            <!-- Haber Kartları buraya gelecek -->
        </section>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-400 mb-4"></div>
        <p class="font-bold tracking-widest uppercase animate-pulse">Llama 3 Analiz Ediyor...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
